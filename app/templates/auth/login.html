{% extends "base.html" %}
{% block auth_content %}
<style>
.auth-page{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg);padding:20px}
.auth-page::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(0,212,255,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,212,255,.03) 1px,transparent 1px);background-size:40px 40px;pointer-events:none}
.auth-box{background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:38px;width:100%;max-width:400px;position:relative;z-index:1}
.auth-logo{font-family:'Syne',sans-serif;font-weight:800;font-size:1.7rem;background:linear-gradient(135deg,#fff,var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:5px}
.auth-sub{color:var(--muted);font-size:.85rem;margin-bottom:28px}
.auth-footer{text-align:center;margin-top:18px;font-size:.83rem;color:var(--muted)}
.auth-footer a{color:var(--accent);text-decoration:none}
</style>
<div class="auth-page">
  <div class="auth-box fade-up">
    <div class="auth-logo">📚 LearnTrack</div>
    <div class="auth-sub">Track your learning journey — step by step.</div>
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for cat,msg in messages %}<div class="flash {{cat}}">{{msg}}</div>{% endfor %}
    {% endwith %}
    <form method="POST">
      <div class="form-group"><label>Username</label><input type="text" name="username" required autofocus placeholder="your username"></div>
      <div class="form-group"><label>Password</label><input type="password" name="password" required placeholder="••••••••"></div>
      <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;padding:11px">Sign In →</button>
    </form>
    <div class="auth-footer">No account? <a href="{{ url_for('auth.register') }}">Register here</a></div>
  </div>
</div>
{% endblock %}
